variables:
  PYTHON_IMAGE: python:3.10
  RUN_DIR: ./cicd/runtime

default:
  tags:
    - docker

include:
  # CI/CD debugging — manual only
  - local: cicd/gitlab/parts/debug.gitlab-ci.yml
  # Perl checks — on *.pl/*.pm changes, pipeline update, or manually
  - local: cicd/gitlab/parts/perl.gitlab-ci.yml
  # Python checks — on *.py changes, pipeline update, or manually
  - local: cicd/gitlab/parts/python.gitlab-ci.yml
  # Flat file checks — on *.json/*.yml/*.yaml changes, pipeline update, or manually
  - local: cicd/gitlab/parts/flatfile.gitlab-ci.yml

# External pipelines
# (from https://gitlab.com/gitlab-org/gitlab/-/tree/master/lib/gitlab/ci/templates)

external:code_quality:
  # https://docs.gitlab.com/ci/testing/code_quality/
  stage: test
  when: manual
  trigger:
    strategy: depend
    forward:
      pipeline_variables: false
      yaml_variables: false
    include:
      - template: Code-Quality.gitlab-ci.yml
