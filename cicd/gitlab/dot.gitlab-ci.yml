stages:
  - pipelines

trigger:ci:
  stage: pipelines
  rules:
    - if: >
        $CI_EXTERNAL_PULL_REQUEST_IID &&
        $CI_EXTERNAL_PULL_REQUEST_SOURCE_REPOSITORY == $CI_EXTERNAL_PULL_REQUEST_TARGET_REPOSITORY
      when: always
    - when: manual
  trigger:
    include:
      - local: cicd/gitlab/parts/ci.gitlab-ci.yml
    strategy: depend
    forward:
      pipeline_variables: true
      yaml_variables: true

trigger:release:
  stage: pipelines
  rules:
    - if: >
        $CI_COMMIT_TAG &&
        $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[a-zA-Z0-9-]+)?$/
      when: always
    - when: never
  trigger:
    include:
      # GenomIO docker deploy
      - local: cicd/gitlab/parts/dockerbuild.gitlab-ci.yml
    strategy: depend
    forward:
      pipeline_variables: true
      yaml_variables: true
