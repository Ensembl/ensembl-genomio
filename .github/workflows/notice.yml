name: "Update NOTICE copyright year at the start of every year"

on:
  schedule:
    - cron:  '15 15 1 1 *'

jobs:
  notice_update:
    name: Update NOTICE copyright year
    runs-on: ubuntu-latest
    env:
      branch_name: bau/notice-update
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Update NOTICE file
        run: |
          sed -i "s/$(date +%Y --date='1 year ago')/$(date +%Y)/" NOTICE

      - name: Commit changes and create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ env.branch_name }}"
          git add NOTICE
          git commit -m "Update NOTICE copyright year"
          git push origin "${{ env.branch_name }}"
          gh pr create \
            -B main \
            -H "${{ env.branch_name }}" \
            --title "Update NOTICE copyright year" \
            --body "Created by GitHub Actions pipeline"
